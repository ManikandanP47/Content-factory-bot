niche: productivity / founder tips
tone: direct, punchy, no fluff, speak like a peer not a lecturer
language: en

voice:
  # Genuine AI male narration (free, local):
  #   1) Piper Ryan high  → pip install piper-tts (default)
  #   2) Kokoro am_adam   → optional ./scripts/setup_male_voice.sh
  #   3) edge-tts AndrewNeural
  #   4) macOS Daniel
  provider: piper  # piper | auto | kokoro | edge | macos
  piper_model: en_US-ryan-high
  piper_length_scale: 1.05
  kokoro_voice: am_adam
  kokoro_lang: a
  edge_voice: en-US-AndrewNeural
  macos_voice: Daniel
  speed: 0.95

audio:
  music_volume_db: -26
  music_dir: assets/music
  normalize: true
  end_pad_seconds: 2.4

video:
  width: 1080
  height: 1920
  fps: 30
  # Hold after narration so CTA finishes (no mid-close cut)
  end_pad_seconds: 2.4
  brand:
    bg_top: "#07141C"
    bg_bottom: "#16384A"
    accent: "#F0B429"
    text: "#F7F4EC"
    muted: "#9EB6C2"
    font_display: "DM Sans"
    font_body: "DM Sans"

channels:
  drive_root_folder: Content Factory
  # Target channel for Shorts (OAuth must be with this channel's Google account)
  youtube_channel: MoticateUrself
  youtube_privacy: private  # flip to public after first successful test upload
  youtube_category_id: "22"
  # Instagram paused for now — YouTube Shorts only
  instagram_enabled: false
  instagram_share_to_feed: true

ollama:
  base_url: http://127.0.0.1:11434
  model: llama3.2
  timeout_seconds: 120
