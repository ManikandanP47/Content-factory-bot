niche: productivity / founder tips
tone: direct, punchy, no fluff, speak like a peer not a lecturer
language: en

voice:
  # Prefer Kokoro when installed; then edge-tts; then macOS say
  provider: auto  # auto | kokoro | edge | macos
  kokoro_voice: af_heart
  kokoro_lang: a
  edge_voice: en-US-JennyNeural
  macos_voice: Samantha
  speed: 1.0

audio:
  music_volume_db: -26
  music_dir: assets/music
  normalize: true
  end_pad_seconds: 2.4

video:
  width: 1080
  height: 1920
  fps: 30
  # Hold after narration so CTA finishes (no mid-close cut)
  end_pad_seconds: 2.4
  brand:
    bg_top: "#07141C"
    bg_bottom: "#16384A"
    accent: "#F0B429"
    text: "#F7F4EC"
    muted: "#9EB6C2"
    font_display: "DM Sans"
    font_body: "DM Sans"

channels:
  drive_root_folder: Content Factory
  youtube_privacy: private
  youtube_category_id: "22"
  instagram_share_to_feed: true

ollama:
  base_url: http://127.0.0.1:11434
  model: llama3.2
  timeout_seconds: 120
